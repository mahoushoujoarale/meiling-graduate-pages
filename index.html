<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尖端扭转型室速不良反应预测系统</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --success: #16a34a;
      --success-light: #dcfce7;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white; padding: 24px 32px; box-shadow: var(--shadow);
    }
    .header h1 { margin: 0; font-size: 1.6rem; font-weight: 600; }
    .header p { margin: 6px 0 0; opacity: 0.9; font-size: 0.95rem; }
    .container {
      max-width: 1400px; margin: 24px auto; padding: 0 24px;
      display: grid; grid-template-columns: 1fr 420px; gap: 24px;
    }
    @media (max-width: 1100px) {
      .container { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 24px;
    }
    .card-title {
      font-size: 1.1rem; font-weight: 600; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .icon { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; font-size: 14px; }
    .feature-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    @media (max-width: 700px) {
      .feature-grid { grid-template-columns: 1fr; }
    }
    .feature-item {
      padding: 14px; border: 1px solid var(--border); border-radius: 10px;
      background: #fafafa; transition: border-color 0.2s;
    }
    .feature-item:hover { border-color: var(--primary); }
    .feature-label { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .feature-hint { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
    .feature-input-wrap { display: flex; align-items: center; gap: 10px; }
    input[type="number"] {
      width: 90px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; transition: border-color 0.2s; text-align: center;
    }
    input[type="number"]:focus { outline: none; border-color: var(--primary); }
    input[type="range"] { flex: 1; accent-color: var(--primary); }
    .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { opacity: 0.92; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }
    .result-card { position: sticky; top: 24px; max-height: calc(100vh - 48px); overflow-y: auto; }
    .probability-ring {
      width: 160px; height: 160px; margin: 0 auto 16px; position: relative;
    }
    .probability-ring svg { transform: rotate(-90deg); }
    .probability-ring .track { fill: none; stroke: var(--border); stroke-width: 10; }
    .probability-ring .progress {
      fill: none; stroke-width: 10; stroke-linecap: round;
      transition: stroke-dashoffset 1s ease, stroke 0.5s;
    }
    .probability-text {
      position: absolute; inset: 0; display: grid; place-items: center;
    }
    .probability-text .value { font-size: 2rem; font-weight: 700; }
    .probability-text .label { font-size: 0.8rem; color: var(--text-muted); margin-top: -10px; }
    .risk-badge {
      display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 600;
      margin-top: 8px;
    }
    .risk-low { background: var(--success-light); color: var(--success); }
    .risk-mid { background: var(--warning-light); color: var(--warning); }
    .risk-high { background: var(--danger-light); color: var(--danger); }
    .model-info { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; text-align: center; }
    .loading { display: none; text-align: center; padding: 20px; }
    .loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .model-loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .model-loading .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; }
    .empty-state .big { font-size: 3rem; margin-bottom: 8px; }
    .section-title { font-size: 0.9rem; font-weight: 600; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .shap-chart { margin-top: 16px; }
    .shap-bar { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
    .shap-bar-label { width: 120px; font-size: 0.8rem; text-align: right; flex-shrink: 0; }
    .shap-bar-track { flex: 1; height: 22px; background: #e5e7eb; border-radius: 4px; position: relative; }
    .shap-bar-fill {
      height: 100%; border-radius: 4px; transition: width 0.6s ease; min-width: 2px;
    }
    .shap-bar-value { font-size: 0.8rem; min-width: 60px; text-align: right; flex-shrink: 0; }
    .shap-pos { color: var(--danger); font-weight: 600; }
    .shap-neg { color: var(--primary); font-weight: 600; }
    .feature-table { width: 100%; font-size: 0.82rem; border-collapse: collapse; margin-top: 12px; }
    .feature-table th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
    .feature-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .feature-table tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>尖端扭转型室速不良反应预测系统</h1>
    <p>基于 CatBoost 模型 · 6 项最优特征 · 浏览器端 ONNX 推理</p>
  </div>

  <div id="modelLoading" class="model-loading">
    <div class="spinner"></div>
    <div>正在加载 ONNX 模型...</div>
    <div style="font-size:0.8rem; margin-top:8px;">首次加载约需 2-5 秒</div>
  </div>

  <div class="container" id="mainContent" style="display:none;">
    <div class="card">
      <div class="card-title">
        <div class="icon" style="background: var(--primary-light); color: var(--primary);">&#128203;</div>
        患者特征录入
      </div>
      <form id="predictForm">
        <div class="feature-grid" id="featureGrid"></div>
      </form>
      <div class="actions">
        <button class="btn btn-primary" onclick="submitPredict()">&#128302; 预测风险</button>
        <button class="btn btn-secondary" onclick="fillDemo('high')">&#128293; 高风险示例</button>
        <button class="btn btn-secondary" onclick="fillDemo('low')">&#128154; 低风险示例</button>
        <button class="btn btn-secondary" onclick="resetForm()">&#128260; 重置</button>
      </div>
    </div>

    <div class="card result-card">
      <div class="card-title">
        <div class="icon" style="background: var(--success-light); color: var(--success);">&#128200;</div>
        预测结果
      </div>
      <div id="resultEmpty" class="empty-state">
        <div class="big">&#129516;</div>
        <div>请输入患者特征并点击「预测风险」</div>
        <div style="font-size:0.8rem; margin-top:6px;">模型在浏览器中直接运行，无需后端服务器</div>
      </div>
      <div id="resultLoading" class="loading">
        <div class="spinner"></div>
        <div>正在计算预测与解释...</div>
      </div>
      <div id="resultContent" style="display:none;">
        <div class="probability-ring">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle class="track" cx="80" cy="80" r="70"></circle>
            <circle id="probCircle" class="progress" cx="80" cy="80" r="70"
                    stroke-dasharray="440" stroke-dashoffset="440" stroke="#2563eb"></circle>
          </svg>
          <div class="probability-text">
            <div>
              <div class="value" id="probValue">0%</div>
              <div class="label">阳性概率</div>
            </div>
          </div>
        </div>
        <div style="text-align:center;">
          <span id="riskBadge" class="risk-badge risk-low">低风险</span>
        </div>
        <div class="model-info" id="modelInfo"></div>

        <div style="margin-top: 20px;">
          <div class="section-title">特征贡献解释 (近似 SHAP)</div>
          <div id="shapChart" class="shap-chart"></div>
          <div class="section-title">Top 影响因子</div>
          <table class="feature-table">
            <thead><tr><th>特征</th><th>SHAP值</th><th>方向</th></tr></thead>
            <tbody id="shapTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let MODEL = null;
    let FEATURES = [];
    let SCALER = { mean: [], scale: [] };
    let META = [];
    let FI = {};

    const DEMO_HIGH = {
      '利尿剂总剂量': 0.05, '心率HR': 130, '钙离子(Ca2+)': 2.0,
      '白细胞计数(WBC#)': 12.0, '钾离子(K+)': 3.4, '总胆红素(TBIL)': 20.0
    };
    const DEMO_LOW = {
      '利尿剂总剂量': 0.0, '心率HR': 80, '钙离子(Ca2+)': 2.25,
      '白细胞计数(WBC#)': 6.5, '钾离子(K+)': 4.2, '总胆红素(TBIL)': 10.0
    };

    async function loadAssets() {
      try {
        const [metaResp, scalerResp, fiResp] = await Promise.all([
          fetch('feature_meta.json'), fetch('scaler.json'), fetch('feature_importance.json')
        ]);
        META = await metaResp.json();
        const scalerData = await scalerResp.json();
        SCALER = { mean: scalerData.mean, scale: scalerData.scale };
        FEATURES = scalerData.features;
        FI = await fiResp.json();

        MODEL = await ort.InferenceSession.create('model.onnx', {
          executionProviders: ['wasm'], graphOptimizationLevel: 'all'
        });

        document.getElementById('modelLoading').style.display = 'none';
        document.getElementById('mainContent').style.display = 'grid';
        renderForm();
        setTimeout(submitPredict, 300);
      } catch (e) {
        document.getElementById('modelLoading').innerHTML =
          `<div style="color:var(--danger)">模型加载失败: ${e.message}</div>`;
      }
    }

    function renderForm() {
      const grid = document.getElementById('featureGrid');
      grid.innerHTML = '';
      META.forEach(meta => {
        const div = document.createElement('div');
        div.className = 'feature-item';
        div.dataset.feature = meta.name;
        div.innerHTML = `
          <div class="feature-label">${meta.name}</div>
          <div class="feature-hint">单位: ${meta.unit || ''}</div>
          <div class="feature-input-wrap">
            <input type="range" min="${meta.min}" max="${meta.max}" step="${meta.step}" value="${meta.default}"
                   id="slider_${meta.name}" oninput="syncNumber('${meta.name}')">
            <input type="number" name="${meta.name}" id="input_${meta.name}" value="${meta.default}"
                   min="${meta.min}" max="${meta.max}" step="${meta.step}"
                   oninput="syncSlider('${meta.name}')">
          </div>
        `;
        grid.appendChild(div);
      });
    }

    function syncNumber(name) {
      const slider = document.getElementById('slider_' + name);
      const num = document.getElementById('input_' + name);
      num.value = slider.value;
    }
    function syncSlider(name) {
      const slider = document.getElementById('slider_' + name);
      const num = document.getElementById('input_' + name);
      slider.value = num.value;
    }

    function fillDemo(type) {
      const data = type === 'high' ? DEMO_HIGH : DEMO_LOW;
      for (const [name, val] of Object.entries(data)) {
        const input = document.getElementById('input_' + name);
        const slider = document.getElementById('slider_' + name);
        if (input) input.value = val;
        if (slider) slider.value = val;
      }
    }
    function resetForm() {
      META.forEach(meta => {
        const input = document.getElementById('input_' + meta.name);
        const slider = document.getElementById('slider_' + meta.name);
        if (input) input.value = meta.default;
        if (slider) slider.value = meta.default;
      });
    }

    async function submitPredict() {
      const data = {};
      META.forEach(meta => {
        const input = document.getElementById('input_' + meta.name);
        data[meta.name] = parseFloat(input.value);
      });

      document.getElementById('resultEmpty').style.display = 'none';
      document.getElementById('resultContent').style.display = 'none';
      document.getElementById('resultLoading').style.display = 'block';

      try {
        const row = FEATURES.map(f => data[f]);
        const scaled = row.map((v, i) => (v - SCALER.mean[i]) / SCALER.scale[i]);
        const tensor = new ort.Tensor('float32', new Float32Array(scaled), [1, FEATURES.length]);
        const feeds = {};
        feeds[MODEL.inputNames[0]] = tensor;
        const results = await MODEL.run(feeds);
        const probTensor = results.probability_tensor || results.probabilities;
        const prob = probTensor.data[1];

        const shapValues = FEATURES.map((f, i) => ({
          feature: f,
          value: FI[f] * (scaled[i]) / 5,
          raw: scaled[i]
        })).sort((a, b) => Math.abs(b.value) - Math.abs(a.value));

        showResult(prob, shapValues);
      } catch (e) {
        alert('预测失败: ' + e.message);
        document.getElementById('resultLoading').style.display = 'none';
        document.getElementById('resultEmpty').style.display = 'block';
      }
    }

    function showResult(prob, shapValues) {
      document.getElementById('resultLoading').style.display = 'none';
      document.getElementById('resultContent').style.display = 'block';
      setTimeout(() => {
        const resultCard = document.querySelector('.result-card');
        if (resultCard && window.innerWidth <= 1100) {
          resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 100);

      const pct = (prob * 100).toFixed(1);
      document.getElementById('probValue').textContent = pct + '%';

      const circle = document.getElementById('probCircle');
      const circumference = 440;
      const offset = circumference - (prob * circumference);
      circle.style.strokeDashoffset = offset;
      let color = '#2563eb';
      if (prob >= 0.5) color = '#dc2626';
      else if (prob >= 0.3) color = '#f59e0b';
      circle.style.stroke = color;

      const riskLevel = prob >= 0.5 ? '高风险' : (prob >= 0.3 ? '中风险' : '低风险');
      const badge = document.getElementById('riskBadge');
      badge.textContent = riskLevel;
      badge.className = 'risk-badge ' + (prob >= 0.5 ? 'risk-high' : (prob >= 0.3 ? 'risk-mid' : 'risk-low'));

      document.getElementById('modelInfo').textContent = `模型: CatBoost (ONNX) | 特征数: ${FEATURES.length}`;

      // SHAP 条形图
      const chart = document.getElementById('shapChart');
      chart.innerHTML = '';
      const maxAbs = Math.max(...shapValues.map(s => Math.abs(s.value)), 0.001);
      shapValues.forEach(s => {
        const isPos = s.value > 0;
        const widthPct = (Math.abs(s.value) / maxAbs * 100).toFixed(1);
        const bar = document.createElement('div');
        bar.className = 'shap-bar';
        bar.innerHTML = `
          <div class="shap-bar-label">${s.feature}</div>
          <div class="shap-bar-track">
            <div class="shap-bar-fill" style="width:${widthPct}%; background:${isPos ? '#e15759' : '#4e79a7'}"></div>
          </div>
          <div class="shap-bar-value ${isPos ? 'shap-pos' : 'shap-neg'}">${isPos ? '+' : ''}${s.value.toFixed(3)}</div>
        `;
        chart.appendChild(bar);
      });

      // Top 表格
      const tbody = document.getElementById('shapTable');
      tbody.innerHTML = '';
      shapValues.slice(0, 6).forEach(s => {
        const tr = document.createElement('tr');
        const isPos = s.value > 0;
        const dir = isPos ? '↑ 增加风险' : '↓ 降低风险';
        tr.innerHTML = `<td>${s.feature}</td><td class="${isPos ? 'shap-pos' : 'shap-neg'}">${isPos ? '+' : ''}${s.value.toFixed(3)}</td><td>${dir}</td>`;
        tbody.appendChild(tr);
      });
    }

    loadAssets();
  </script>
</body>
</html>
